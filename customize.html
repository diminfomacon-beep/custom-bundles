        body {font-family: 'Segoe UI', sans-serif; background:#CAE4DB; margin:0; padding-bottom: 250px;}
        .wrapper {max-width: 950px; margin: auto; padding: 20px;}
        
        /* Apply to All Bar */
        #bulk-actions {
            background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; 
            border: 2px dashed #2F6B64; display: flex; align-items: center; justify-content: space-between;
        }

        .item-row {
            background: #9cbdb1; border-radius: 12px; padding: 25px; margin-bottom: 30px; 
            display: grid; grid-template-columns: 320px 1fr; gap: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative;
        }

        /* Top Right "X" Button */
        .remove-x {
            position: absolute; top: 10px; right: 10px; background: #fee2e2; color: #ef4444;
            border: 1px solid #fecaca; width: 30px; height: 30px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;
        }

        /* Gray preview background so white products pop */
     
        .product-preview {
            width: 300px;
            height: 300px;
            background: #e5e7eb;
            border-radius: 10px;
            position: relative;
            /* This handles the vertical stacking */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 10px;
        }

        .base-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            opacity: 0.5; /* Keeps the product visible behind the design */
        }

        .user-img-overlay {
            position: relative; /* Changed from absolute to participate in flex flow */
            max-width: 60%;
            max-height: 60%;
            object-fit: contain;
            order: 1;
            z-index: 2;
            margin-bottom: 10px; /* Space between image and text */
        }

        .preview-text {
            position: relative; /* Changed from absolute to participate in flex flow */
            width: 90%;
            margin: 0 auto;
            order:2;
            text-align: center;
            z-index: 3;
            word-wrap: break-word;
            line-height: 1.2;
            pointer-events: none;
        }

       

        #total-display {
            margin-bottom: 10px;
            line-height: 1.2;
        }


        /* Square Color Swatches */
        .color-swatches { display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .color-sq { width: 25px; height: 25px; cursor: pointer; border: 1px solid #ccc; }
        .color-sq.active { outline: 2px solid #000; }

        /* Larger Font Dropdown with Previews */
        select.font-selector { width: 100%; padding: 12px; font-size: 16px; border-radius: 6px; margin-bottom: 10px; }
        
        textarea { width: 100%; border-radius: 6px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; resize: vertical; }

        .btn-upload { background: #2F6B64; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer;  margin-bottom: 10px; font-weight: bold; }
        .btn-clear {
                    flex: 1; background: #FEE84A; color: #000; border: none; padding: 8px; 
                    border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: bold;
                }
        /* 2. Make the "Pills" look like clickable buttons */
        .option-pill {
            background: white;
            padding: 6px 12px;
            border: 1px solid #2F6B64;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        /* 3. Highlight the selected pill */
        .option-pill.active {
            background: #2F6B64;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 4. Make the Font Selector big enough for the text */
        .font-selector {
            padding: 12px !important;
            font-size: 16px !important;
            height: auto !important;
        }

        .variation-dropdown, .style-dropdown {
            background-color: #ffffff;
            cursor: pointer;
            font-size: 14px;
            color: #374151;
            transition: border-color 0.2s;
        }

        .variation-dropdown:focus, .style-dropdown:focus {
            border-color: #2F6B64;
            outline: none;
            box-shadow: 0 0 0 2px rgba(47, 107, 100, 0.2);
        }
        
        .sticky-footer-container {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
        }

        
       .summary-bar {
            position: fixed;
            bottom: 20px;       /* distance from bottom */
            right: 20px;         /* distance from left */
            width: auto;        /* shrink to content */
            max-width: 300px;   /* optional: prevent it from getting too wide */
            background: #2F6B64;
            color: white;
            padding: 15px 20px; /* you can reduce padding to make it less tall */
            border-radius: 12px; /* rounded corners look nice */
            text-align: left;    /* align text nicely */
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-family: 'Segoe UI', sans-serif;
        }
        .studio-notification {
            background: #fbbf24; color: #000; text-align: center; 
            padding: 10px; font-weight: bold; font-size: 0.85rem;
            display: flex; flex-direction: column; align-items: center;
        }

        .bouncing-arrow {
            font-size: 1.2rem; line-height: 1;
            animation: bounce 1.2s infinite;
        }
         @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }
         #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .item-row { grid-template-columns: 1fr; justify-items: center; }
            .preview-section, .product-preview { width: 100%; max-width: 320px; }
            .summary-bar { padding: 10px 15px; }
            #paypal-button-container { width: 150px; }
        }
        .details input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .preview-section input[type="number"] {
            width: 60px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 10px;
        }


       .details select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 10px;
            background-color: #fff;
            cursor: pointer;
        }
        
        #paypal-wrapper {
            display: flex;
            justify-content: flex-start; /* keep it left-aligned */
            margin-top: 10px;
        }

        #paypal-button-container {
            max-width: 200px; /* fit nicely inside sticky box */
            width: 100%;
        }

];

const colorSwatches = ['#000000','#FFFFFF','#BE123C','#1E3A8A', '#14532D','#2563EB','#E2918F','#D4AF37','#C0C0C0','#DB2777','#A78BFA','#EA580C'];

// --- 3. THE RENDER ENGINE ---
function render() {
    const container = document.getElementById('items-container');
    if (!container) return;
    container.innerHTML = '';
    
    let subtotal = 0;
    let itemCount = 0;

    const entries = Object.entries(bundle);
    if (entries.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px;"><h2>Your bundle is empty</h2><a href="index.html" style="color:#2F6B64;">Return to Catalog</a></div>';
        return;
    }

    entries.forEach(([key, item]) => {
        const p = productList.find(prod => prod.id === item.productId);
        if(!p) return;

        // Logic for Variation/Style selection
        const selectedVar = p.variations ? p.variations.find(v => v.label === item.variety) : null;
        const selectedStyle = p.styles ? p.styles.find(s => s.label === item.style) : null;
        
        let extra = 0;
        if (selectedVar) extra += selectedVar.extra;
        if (selectedStyle) extra += selectedStyle.extra;
        const itemPrice = p.basePrice + extra;
        const itemSubtotal = itemPrice * item.quantity;
        
        // Dynamic Image Update
        const displayImg = selectedStyle?.image || selectedVar?.image || p.images[0];

        subtotal += ((p.basePrice + extra) * item.quantity);
        itemCount += item.quantity;

        const row = document.createElement('div');
        row.className = 'item-row';
        row.setAttribute('data-key', key);
        row.innerHTML = `
            <div class="remove-x" onclick="removeItem('${key}')">X</div>
            <div class="preview-section">
                <div class="product-preview">
                    <img src="${displayImg}" class="base-img">
                    ${item.localImage ? `<img src="${item.localImage}" class="user-img-overlay">` : ''}
                    <div class="preview-text" style=" color:${item.textColor || '#000'}; font-family:${item.fontFamily || 'sans-serif'}; font-size:${item.fontSize || 22}px;">${item.customText ?? ''}</div>
                </div>
                <input type="file" id="file-input-${key}" style="display: none;" accept="image/*" onchange="handleImageUpload('${key}', this)">
                <button class="btn-upload" onclick="document.getElementById('file-input-${key}').click()" style="width: auto; margin-top: 10px;">
                    ${item.localImage ? '✓ Image Loaded' : 'Upload Image'}
                </button>
                <button class="btn-clear" onclick="clearDesign('${key}')">Clear Design</button>
                <div>
                    <label>Quantity</label>
                    <input type="number" min="1" value="${item.quantity || 1}" oninput="updateQuantity('${key}', this.value)">
                </div>
                <div style="font-weight:bold; color:#000000; margin-top:5px;">
                        Item Total: $${itemSubtotal.toFixed(2)}
                </div>
                </div>
            </div>
            <div class="details" style="font-size: 16px; color:#000; font-weight: bold;">
               <div>
                    <h2 style="margin:0 0 5px 0; color:#000000;">${p.name}</h2>
                    <div style="font-size:16px; font-weight: bold; margin-bottom:10px;">
                        $${itemPrice.toFixed(2)} each
                    </div>
                    <div Style="font-size: 12px; color: blue;">(Discount calculated in final Total)</div>
                    
                    <hr>
                    <label>Option</label>
                    ${p.variations ? `
                            <select onchange="updateProp('${key}', 'variety', this.value)">
                                ${p.variations.map(v => `<option value="${v.label}" ${item.variety === v.label ? 'selected' : ''}>${v.label} (+$${v.extra.toFixed(2)})</option>`).join('')}
                            </select>
                        ` : ''}

                        ${p.styles ? `
                            
                            <select onchange="updateProp('${key}', 'style', this.value)">
                                ${p.styles.map(s => `<option value="${s.label}" ${item.style === s.label ? 'selected' : ''}>${s.label} (+$${s.extra.toFixed(2)})</option>`).join('')}
                            </select>
                        ` : ''}
                </div>
                <div><label>Add Text</label></div>
                <div><input type="text" value="${item.customText ?? ''}" oninput="updateProp('${key}', 'customText', this.value)" placeholder="Enter text here..."></div>
                <div><label>Text Color</label></div>
                <div class="color-swatches">${colorSwatches.map(c => `<div class="color-sq ${item.textColor === c ? 'active' : ''}" style="background:${c}" onclick="updateProp('${key}', 'textColor', '${c}')"></div>`).join('')}</div>
                <div style="font-size:16px; margin-bottom:10px;"><label>Font Size</label>
                <input type="range" min="10" max="80" value="${item.fontSize || 22}" oninput="updateProp('${key}', 'fontSize', this.value)">${item.fontSize || 22}px</div>
                <div><label>Font Style</label>
                <select onchange="updateProp('${key}', 'fontFamily', this.value)">${fontOptions.map(f => `<option value="${f.family}" style="font-family:${f.family}" ${item.fontFamily === f.family ? 'selected' : ''}>${f.name}</option>`).join('')}</select></div>
                <div><label>Special Instructions</label>
                <textarea rows="3" oninput="updateProp('${key}', 'notes', this.value)">${item.notes || ''}</textarea></div>
            </div>
        `;
      
        console.log("ITEM:", item);
        container.appendChild(row);
    });
    
    // --- Totals Display ---
    let discPercent = 0;
    if (itemCount === 2) discPercent = 0.05;
    else if (itemCount >= 3 && itemCount <= 5) discPercent = 0.10;
    else if (itemCount >= 6 && itemCount <= 10) discPercent = 0.15;
    else if (itemCount >= 11) discPercent = 0.20;
        
    const finalTotal = subtotal * (1 - discPercent);
    const savings = subtotal - finalTotal;
    let nextTierMsg = "";

    if (itemCount === 1) nextTierMsg = "Add 1 more item to get 5% OFF";
    else if (itemCount === 2) nextTierMsg = "Add 1 more item to get 10% OFF";
    else if (itemCount >= 3 && itemCount <= 4) nextTierMsg = "Add more items to get 15% OFF";
    else if (itemCount >= 6 && itemCount <= 9) nextTierMsg = "Add more items to get 20% OFF";
   document.getElementById('total-display').innerHTML = `
    <div style="font-size:14px;">
        Items: ${itemCount}
    </div>

    ${discPercent > 0 ? `
        <div style="font-size:14px; color:#bbf7d0;">
            Discount Applied: ${(discPercent * 100)}% OFF
        </div>
        <div style="font-size:13px; color:#bbf7d0;">
            You Save: $${savings.toFixed(2)}
        </div>
        <div style="text-decoration:line-through; font-size:13px; opacity:0.7;">
            Subtotal: $${subtotal.toFixed(2)}
        </div>
    ` : ''}

    <div style="font-size:24px; font-weight:bold; margin-top:5px;">
        Total: $${finalTotal.toFixed(2)}
    </div>
         ${nextTierMsg ? `
    <div style="font-size:12px; opacity:0.8; margin-top:5px;">
        ${nextTierMsg}
    </div>
` : ''}
`;
    initPayPal(finalTotal.toFixed(2));
}
    
// --- 4. CORE FUNCTIONS ---
window.updateProp = (key, prop, val) => {
    if (prop === 'fontSize') val = parseInt(val);

    bundle[key][prop] = val;
    localStorage.setItem('myBundle', JSON.stringify(bundle));

    const card = document.querySelector(`[data-key="${key}"]`);

    if (prop === 'customText' && card) {
        card.querySelector('.preview-text').textContent = val;
    } else if (prop === 'fontSize' && card) {
        card.querySelector('.preview-text').style.fontSize = val + "px";
    } else {
        render();
    }
};

window.handleImageUpload = (key, input) => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        bundle[key].localImage = e.target.result; 
        localStorage.setItem('myBundle', JSON.stringify(bundle));
        render();
    };
    reader.readAsDataURL(file);
};

window.clearDesign = (key) => {
    bundle[key].customText = "";
    bundle[key].localImage = null;
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    render();
};

window.removeItem = (key) => {
    delete bundle[key];
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    if (Object.keys(bundle).length === 0) window.location.href = 'index.html';
    render();
};
window.updateQuantity = (key, val) => {
    let qty = parseInt(val);

    // Prevent invalid values
    if (isNaN(qty) || qty < 1) qty = 1;

    bundle[key].quantity = qty;

    localStorage.setItem('myBundle', JSON.stringify(bundle));
    render();
};

// --- 5. CHECKOUT FUNCTIONS ---
async function processCloudinaryUploads() {
    for (let key in bundle) {
        if (bundle[key].localImage) {
            const formData = new FormData();
            formData.append('file', bundle[key].localImage);
            formData.append('upload_preset', 'Custom_Bundle_Preset'); 
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dpsmcu07f/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                bundle[key].cloudinaryUrl = data.secure_url;
            } catch (e) { console.error("Cloudinary Error:", e); }
        }
    }
}

function initPayPal(total) {
    const container = document.getElementById('paypal-button-container');
    if (!container) return;
    container.innerHTML = '';
    paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal', tagline: false },
        fundingSource: paypal.FUNDING.PAYPAL,
        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: total } }] }),
        onApprove: (data, actions) => actions.order.capture().then(details => sendOrderEmail(details))
    }).render('#paypal-button-container');
}

async function sendOrderEmail(details) {
    await processCloudinaryUploads();
    let summary = Object.entries(bundle).map(([k, v]) => `ITEM: ${v.productId}\nTEXT: ${v.customText || 'N/A'}\nLINK: ${v.cloudinaryUrl || 'No Image'}\n---`).join('\n');
    
    emailjs.send('service_ezq1fuc', 'template_r4hpykx', {
        order_id: details.id,
        customer_name: details.payer.name.given_name,
        message: summary,
        total_paid: details.purchase_units[0].amount.value
    }).then(() => {
        localStorage.clear();
        window.location.href = "thank-you.html";
    });
}
window.goBackToCatalog = () => {
    // Save any typed text or colors before leaving
    try {
        localStorage.setItem('myBundle', JSON.stringify(bundle));
    } catch (e) {
        console.warn("LocalStorage save failed, but moving back anyway.");
    }

    // Try moving back in history first (Best for Google Sites)
    if (window.history.length > 1) {
        window.history.back();
    } else {
        // Fallback if they opened the link directly in a new tab
        window.location.href = 'index.html';
    }
};
// Kickstart the page
render();
