<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize Your Bundle</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Bebas+Neue&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@1,700&family=Graduate&family=Cinzel:wght@700&family=Fredoka+One&family=Space+Mono&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AYCrwEjBMTIJctW65WTbEqCfEGx4IYVyLFU09iInrV8m4nLFonxGlAb6bD707bL-qaDSPUNfqJJzgoYS&currency=USD"></script>
    
    <script type="text/javascript">
      (function(){ emailjs.init("1LZbCPvH49G_r0ypB"); })();
    </script>

    <style>
        body {font-family: 'Segoe UI', Tahoma, sans-serif; background:#CAE4DB; padding:0; margin:0; color: #1f2937; padding-bottom: 180px;}
        .wrapper {max-width: 950px; margin: auto; padding: 20px;}
        .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        
        #bulk-actions {
            background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; 
            border: 2px dashed #2F6B64; display: none; align-items: center; justify-content: space-between;
        }

        .item-row {
            background: #9cbdb1; border-radius: 12px; padding: 25px; margin-bottom: 20px; 
            display: grid; grid-template-columns: 300px 1fr; gap: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative;
        }

        .product-preview {
            width: 300px; height: 280px; background: #f9f9f9; border-radius: 8px; 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border: 1px solid #eee; overflow: hidden; padding: 10px;
        }
        
        .base-img { position: absolute; width: 90%; height: 90%; object-fit: contain; opacity: 0.25; z-index: 0; }
        .user-img-overlay { max-width: 55%; max-height: 55%; object-fit: contain; z-index: 2; margin-bottom: 10px; }
        .preview-text { width: 90%; text-align: center; font-weight: bold; font-size: 1.5rem; z-index: 2; word-wrap: break-word; line-height: 1.1; }
        
        .design-controls { display: flex; gap: 8px; width: 100%; }
        .btn-upload {
            flex: 2; background: #2F6B64; color: white; padding: 10px; border-radius: 6px; 
            font-size: 0.75rem; text-align: center; cursor: pointer; font-weight: bold;
        }
        .btn-upload.success { background: #059669; }
        
        /* Fixed Buttons for Google Sites */
        .btn-clear, .remove-btn {
            cursor: pointer !important;
            pointer-events: auto !important;
            position: relative;
            z-index: 20;
        }

        .btn-clear {
            flex: 1; background: #FEE84A; color: #000; border: none; padding: 8px; 
            border-radius: 20px; font-size: 0.75rem; font-weight: bold;
        }

        .remove-btn {
            background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; 
            padding: 8px 12px; border-radius: 6px; font-size: 1.1rem; font-weight: bold;
        }

        .swatch-container { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .swatch { width: 28px; height: 28px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .swatch.active { outline: 2px solid #000; outline-offset: 2px; }

        .details h3 {margin: 0 0 5px 0; color: #2F6B64;}
        label {display: block; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #000;}
        
        input[type="text"], textarea, select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            margin-bottom: 15px; font-family: inherit; box-sizing: border-box; background: white;
        }

        .sticky-footer-container { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; }
        .summary-bar {
            background: #2F6B64; color: white; padding: 15px 30px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .studio-notification { background: #fbbf24; color: #000; text-align: center; padding: 10px; font-weight: bold; font-size: 0.85rem; }

        @media (max-width: 768px) {
            .item-row { grid-template-columns: 1fr; }
            #paypal-button-container { width: 150px; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>Processing Designs...</p>
</div>

<div class="wrapper">
    <div class="header">
        <button id="back-btn" style="cursor:pointer; padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-weight: bold;">← Back to Catalog</button>
        <h2 style="margin:0">Customize Bundle</h2>
    </div>
    <div id="bulk-actions">
        <div><strong>Bulk Design:</strong> Sync first item?</div>
        <button id="apply-all-btn" style="background: #2F6B64; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Apply to All</button>
    </div>

    <div id="items-container"></div>
</div>

<div class="sticky-footer-container">
    <div class="summary-bar">
        <div><span style="opacity:0.8; font-size: 0.8rem;">Total:</span><div style="font-size: 1.4rem; font-weight: bold;">$<span id="total-price">0</span></div></div>
        <div id="paypal-button-container"></div>
    </div>
    <div class="studio-notification">
        For more flexible customized designs visit the D.I.M. Design Studio
        <div class="bouncing-arrow">🔻🔻🔻🔻🔻⬇️🔻🔻🔻🔻🔻</div>
    </div>
</div>

<script>
let bundle = JSON.parse(localStorage.getItem('myBundle')) || {};

// 1. GLOBAL CLICK LISTENER (The fix for Google Sites)
document.addEventListener('click', function(e) {
    const target = e.target;
    const key = target.getAttribute('data-key');

    if (target.classList.contains('remove-btn')) {
        removeItem(key);
    } else if (target.classList.contains('btn-clear')) {
        clearDesign(key);
    } else if (target.id === 'back-btn') {
        goBackToCatalog();
    } else if (target.id === 'apply-all-btn') {
        applyFirstToAll();
    }
});

const availableColors = [
    { name: 'Black', hex: '#000000' }, { name: 'White', hex: '#FFFFFF' }, { name: 'Red', hex: '#BE123C' },
    { name: 'Navy', hex: '#1E3A8A' }, { name: 'Forest', hex: '#14532D' }, { name: 'Royal Blue', hex: '#2563EB' },
    { name: 'Rose Gold', hex: '#E2918F' }, { name: 'Gold', hex: '#D4AF37' }, { name: 'Silver', hex: '#C0C0C0' },
    { name: 'Hot Pink', hex: '#DB2777' }, { name: 'Lavender', hex: '#A78BFA' }, { name: 'Orange', hex: '#EA580C' }
];

const fontOptions = [
    { name: 'Standard', family: "'Segoe UI', sans-serif" },
    { name: 'Cursive', family: "'Pacifico', cursive" },
    { name: 'Bold', family: "'Bebas Neue', sans-serif" },
    { name: 'Modern', family: "'Montserrat', sans-serif" },
    { name: 'Elegant', family: "'Playfair Display', serif" },
    { name: 'Varsity', family: "'Graduate', serif" },
    { name: 'Luxury', family: "'Cinzel', serif" },
    { name: 'Playful', family: "'Fredoka One', cursive" },
    { name: 'Retro', family: "'Space Mono', monospace" },
    { name: 'Sketch', family: "'Shadows Into Light', cursive" }
];

function render() {
    const container = document.getElementById('items-container');
    const totalPriceEl = document.getElementById('total-price');
    const keys = Object.keys(bundle);
    let total = 0;

    container.innerHTML = '';
    document.getElementById('bulk-actions').style.display = keys.length > 1 ? 'flex' : 'none';

    if (keys.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding:40px;'>Bundle is empty.</p>";
        totalPriceEl.textContent = "0";
        return;
    }

    keys.forEach(key => {
        const item = bundle[key];
        total += item.price * item.quantity;
        
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <div class="preview-section">
                <div class="product-preview">
                    <img src="${item.img}" class="base-img">
                    <img class="user-img-overlay" src="${item.cloudinaryUrl || ''}" style="display: ${item.cloudinaryUrl ? 'block' : 'none'}">
                    <div class="preview-text" id="text-layer-${key}" style="color: ${item.textColor || '#000000'}; font-family: ${item.fontFamily}">
                        ${item.customText || ''}
                    </div>
                </div>
                <div class="design-controls">
                    <label class="btn-upload ${item.cloudinaryUrl ? 'success' : ''}">
                        ${item.cloudinaryUrl ? '✓' : 'Upload'}
                        <input type="file" style="display:none" onchange="handleImageUpload('${key}', this)">
                    </label>
                    <button type="button" class="btn-clear" data-key="${key}">Clear</button>
                </div>
            </div>

            <div class="details">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>${key}</h3>
                    <button type="button" class="remove-btn" data-key="${key}">✕</button>
                </div>
                <label>Text Color</label>
                <div class="swatch-container">
                    ${availableColors.map(c => `<div class="swatch ${item.textColor === c.hex ? 'active' : ''}" style="background: ${c.hex}" onclick="updateProp('${key}', 'textColor', '${c.hex}')"></div>`).join('')}
                </div>
                <label>Font Style</label>
                <select onchange="updateProp('${key}', 'fontFamily', this.value)">
                    ${fontOptions.map(f => `<option value="${f.family}" ${item.fontFamily === f.family ? 'selected' : ''}>${f.name}</option>`).join('')}
                </select>
                <label>Custom Text</label>
                <input type="text" value="${item.customText || ''}" oninput="updateProp('${key}', 'customText', this.value)">
                <label>Notes</label>
                <textarea oninput="updateProp('${key}', 'notes', this.value)">${item.notes || ''}</textarea>
            </div>
        `;
        container.appendChild(row);
    });

    totalPriceEl.textContent = total;
    if (total > 0) initPayPal(total);
}

function removeItem(key) {
    delete bundle[key];
    saveAndRefresh();
    if (Object.keys(bundle).length === 0) window.location.href = 'index.html';
}

function clearDesign(key) {
    bundle[key].cloudinaryUrl = '';
    bundle[key].customText = '';
    saveAndRefresh();
}

function saveAndRefresh() {
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    render();
}

window.updateProp = (key, prop, value) => {
    bundle[key][prop] = value;
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    if (prop === 'customText') {
        document.getElementById(`text-layer-${key}`).textContent = value;
    } else {
        render();
    }
};

window.handleImageUpload = async (key, input) => {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('loading-overlay').style.display = 'flex';
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'Custom_Bundle_Preset');
    try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/dpsmcu07f/image/upload`, { method: 'POST', body: formData });
        const data = await response.json();
        if (data.secure_url) {
            bundle[key].cloudinaryUrl = data.secure_url;
            saveAndRefresh();
        }
    } catch (e) { alert("Upload failed."); }
    document.getElementById('loading-overlay').style.display = 'none';
};

function goBackToCatalog() {
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    window.location.href = 'index.html';
}

function applyFirstToAll() {
    const keys = Object.keys(bundle);
    const s = bundle[keys[0]];
    keys.forEach(k => {
        bundle[k].customText = s.customText;
        bundle[k].textColor = s.textColor;
        bundle[k].fontFamily = s.fontFamily;
    });
    saveAndRefresh();
}

function initPayPal(total) {
    const container = document.getElementById('paypal-button-container');
    container.innerHTML = ''; 
    paypal.Buttons({
        style: { layout: 'horizontal', height: 35 },
        createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: total.toString() } }] }),
        onApprove: (d, a) => a.order.capture().then(det => sendOrderEmail(det))
    }).render('#paypal-button-container');
}

function sendOrderEmail(details) {
    let orderSummary = Object.entries(bundle).map(([name, item]) => {
        return `ITEM: ${name} | QTY: ${item.quantity}\nTEXT: ${item.customText}\nCOLOR: ${item.textColor}\nFONT: ${item.fontFamily}\nLINK: ${item.cloudinaryUrl || 'None'}\n---`;
    }).join('\n');

    emailjs.send('service_ezq1fuc', 'template_r4hpykx', {
        order_id: details.id,
        customer_name: details.payer.name.given_name,
        message: orderSummary,
        total_paid: details.purchase_units[0].amount.value
    }).then(() => {
        localStorage.clear();
        window.location.href = "thank-you.html";
    });
}

render();
</script>
</body>
</html>
