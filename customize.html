    <style>
        body {font-family: 'Segoe UI', Tahoma, sans-serif; background:#CAE4DB; padding:0; margin:0; color: #1f2937; padding-bottom: 220px;}
        .wrapper {max-width: 950px; margin: auto; padding: 20px;}
        .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        
        .item-row {
            background: #9cbdb1; border-radius: 12px; padding: 25px; margin-bottom: 20px; 
            display: grid; grid-template-columns: 300px 1fr; gap: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative;
        }

        .product-preview {
            width: 300px; height: 280px; background: #f9f9f9; border-radius: 8px; 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border: 1px solid #eee; overflow: hidden; padding: 10px;
        }
        
        .base-img { position: absolute; width: 90%; height: 90%; object-fit: contain; opacity: 0.25; z-index: 0; }
        .user-img-overlay { max-width: 55%; max-height: 55%; object-fit: contain; z-index: 2; margin-bottom: 10px; }
        .preview-text { width: 90%; text-align: center; font-weight: bold; z-index: 2; word-wrap: break-word; line-height: 1.1; transition: 0.1s font-size; }
        
        .swatch-container { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .swatch { width: 28px; height: 28px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .swatch.active { outline: 2px solid #000; outline-offset: 2px; }

        .details h3 {margin: 0 0 5px 0; color: #2F6B64;}
        label {display: block; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #000;}
        
        input[type="text"], select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            margin-bottom: 15px; font-family: inherit; box-sizing: border-box; background: white;
        }

        .sticky-footer-container { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; }
        .summary-bar {
            background: #2F6B64; color: white; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }
        
        .total-line { display: flex; align-items: baseline; gap: 10px; font-weight: bold; }
        .remove-btn { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #paypal-button-container { width: 100%; max-width: 250px; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

    { name: 'Bold', family: "'Bebas Neue', sans-serif" },
    { name: 'Modern', family: "'Montserrat', sans-serif" },
    { name: 'Elegant', family: "'Playfair Display', serif" },
    { name: 'Varsity', family: "'Graduate', serif" },
    { name: 'Luxury', family: "'Cinzel', serif" },
    { name: 'Playful', family: "'Fredoka One', cursive" },
    { name: 'Retro', family: "'Space Mono', monospace" },
    { name: 'Sketch', family: "'Shadows Into Light', cursive" }
];

function render() {
    const container = document.getElementById('items-container');
    const totalPriceEl = document.getElementById('total-price');
    const keys = Object.keys(bundle);
    let subtotal = 0;

    container.innerHTML = '';

    if (keys.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding:50px;'>Your bundle is empty.</p>";
        totalPriceEl.textContent = "0";
        return;
    }

    // Determine unique categories in the current bundle
    const activeCategories = [...new Set(keys.map(key => {
        const item = bundle[key];
        const p = productList.find(prod => prod.id === item.productId);
        return p ? p.category : "Other";
    }))];

    activeCategories.forEach(catName => {
        const catHeader = document.createElement('h2');
        catHeader.style.cssText = "color: #2F6B64; border-bottom: 2px solid #2F6B64; margin: 30px 0 15px 0; padding-bottom: 5px; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px;";
        catHeader.textContent = catName;
        container.appendChild(catHeader);

        keys.forEach(key => {
            const item = bundle[key];
            const productInfo = productList.find(p => p.id === item.productId);            
            if (!productInfo || productInfo.category !== catName) return;

            const currentVar = productInfo.variations ? (productInfo.variations.find(v => v.label === item.variety) || productInfo.variations[0]) : null;
            const currentStyle = productInfo.styles ? (productInfo.styles.find(s => s.label === item.style) || productInfo.styles[0]) : null;
            const currentSize = productInfo.sizes ? (productInfo.sizes.find(sz => sz.label === item.size) || productInfo.sizes[0]) : null;

            let itemPrice = Number(productInfo.basePrice) || 0;
            if (currentVar) itemPrice += (Number(currentVar.extra) || 0);
            if (currentStyle) itemPrice += (Number(currentStyle.extra) || 0);
            if (currentSize) itemPrice += (Number(currentSize.extra) || 0);
            
            subtotal += itemPrice * (Number(item.quantity) || 1);

            const displayImg = currentStyle ? currentStyle.image : (currentVar ? currentVar.image : productInfo.images[0]);

            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div class="preview-section">
                    <div class="product-preview">
                        <img src="${displayImg}" class="base-img">
                        <img id="img-overlay-${key}" class="user-img-overlay" src="${item.cloudinaryUrl || ''}" style="display: ${item.cloudinaryUrl ? 'block' : 'none'}">
                        <div class="preview-text" id="text-layer-${key}" style="color: ${item.textColor || '#000000'}; font-family: ${item.fontFamily || fontOptions[0].family}; font-size: 24px;">
                            ${item.customText || ''}
                        </div>
                    </div>
                </div>
                <div class="details">
                    <h3 style="margin:0; color: #2F6B64;">${productInfo.name}</h3>
                    <p style="font-size: 0.75rem; color: #666; margin: 5px 0 15px 0;">${productInfo.description}</p>
                    ${productInfo.sizes ? `<label>Size</label><div class="swatch-container">${productInfo.sizes.map(s => `<div class="swatch ${item.size === s.label ? 'active' : ''}" style="background:#fff; width:40px; height:30px; display:flex; align-items:center; justify-content:center; border:1px solid #ccc; font-size:11px; cursor:pointer;" onclick="updateProp('${key}', 'size', '${s.label}')">${s.label}</div>`).join('')}</div>` : ''}
                    ${(productInfo.styles || productInfo.variations) ? `<label>${productInfo.styles ? 'Design Style' : 'Color/Variety'}</label><div class="swatch-container">${(productInfo.styles || productInfo.variations).map(opt => `<div class="swatch ${(item.style === opt.label || item.variety === opt.label) ? 'active' : ''}" style="background: #ffffff; color: #000; width: auto; padding: 6px 12px; border: 1px solid #ccc; font-size: 10px; font-weight: bold; cursor: pointer;" onclick="updateProp('${key}', '${productInfo.styles ? 'style' : 'variety'}', '${opt.label}')">${opt.label} ${opt.extra > 0 ? '(+$'+opt.extra+')' : ''}</div>`).join('')}</div>` : ''}
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:15px;">
                        <div><label>Text Color</label><input type="color" value="${item.textColor || '#000000'}" onchange="updateProp('${key}', 'textColor', this.value)" style="width:100%; height:32px; cursor:pointer; border:1px solid #ddd; padding:0; background:none;"></div>
                        <div><label>Font Style</label><select onchange="updateProp('${key}', 'fontFamily', this.value)" style="height:32px; font-size:12px; width:100%;">${fontOptions.map(f => `<option value="${f.family}" ${item.fontFamily === f.family ? 'selected' : ''}>${f.name}</option>`).join('')}</select></div>
                    </div>
                    <label style="margin-top:12px;">Custom Text</label><input type="text" value="${item.customText || ''}" placeholder="Type your text..." oninput="updateProp('${key}', 'customText', this.value)" style="margin-bottom:10px;">
                    <button class="remove-btn" onclick="removeItem('${key}')" style="width:100%; background:#fee2e2; color:#ef4444; border:1px solid #fecaca; padding:8px; border-radius:6px; font-weight:bold; cursor:pointer;">Remove From Bundle</button>
                </div>
            `;
            container.appendChild(row);
        });
    });

    // --- DISCOUNT LOGIC ---
    let discountPercent = 0;
    const totalQty = Object.values(bundle).reduce((sum, item) => sum + (Number(item.quantity) || 1), 0);

    if (totalQty === 2) discountPercent = 0.05;
    else if (totalQty >= 3 && totalQty <= 5) discountPercent = 0.10;
    else if (totalQty >= 6 && totalQty <= 10) discountPercent = 0.15;
    else if (totalQty >= 11) discountPercent = 0.20;

    const discountAmount = subtotal * discountPercent;
    const finalTotal = subtotal - discountAmount;

    const discountDisplay = document.getElementById('discount-line');
    if (discountPercent > 0) {
        discountDisplay.innerHTML = `<span style="color:#FEE84A;">Bundle Discount (${(discountPercent * 100)}%): -$${discountAmount.toFixed(2)}</span>`;
        discountDisplay.style.display = 'block';
    } else {
        discountDisplay.style.display = 'none';
    }

    totalPriceEl.textContent = finalTotal.toFixed(2);
    if (finalTotal > 0 && typeof paypal !== 'undefined') initPayPal(finalTotal);
}

function getContrastColor(hexColor) {
    if (!hexColor || hexColor === 'transparent') return '#000000';
    const hex = hexColor.replace('#', '');
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
    return (yiq >= 128) ? '#000000' : '#ffffff';
}

window.removeItem = (key) => {
    delete bundle[key];
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    render();
    if (Object.keys(bundle).length === 0) window.location.href = 'index.html';
};

window.updateProp = (key, prop, value) => {
    bundle[key][prop] = value;
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    if (prop === 'customText') {
        const textLayer = document.getElementById(`text-layer-${key}`);
        if (textLayer) textLayer.textContent = value;
    } else {
        render();
    }
};

function initPayPal(total) {
    const container = document.getElementById('paypal-button-container');
    if (!container) return;
    container.innerHTML = ''; 
    paypal.Buttons({
        style: { layout: 'horizontal', height: 35, color: 'gold', shape: 'rect' },
        createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: total.toString() } }] }),
        onApprove: (d, a) => a.order.capture().then(det => sendOrderEmail(det))
    }).render('#paypal-button-container');
}

function sendOrderEmail(details) {
    let orderSummary = Object.entries(bundle).map(([key, item]) => {
    const productInfo = productList.find(p => p.id === item.productId) || { name: "Unknown" };
    return `
ITEM: ${productInfo.name}
SIZE: ${item.size || 'N/A'}
STYLE/VARIETY: ${item.style || item.variety || 'Standard'}
TEXT: ${item.customText || 'None'}
---`;
    }).join('\n');

    emailjs.send('service_ezq1fuc', 'template_r4hpykx', {
        order_id: details.id,
        customer_name: details.payer.name.given_name,
        message: orderSummary,
        total_paid: details.purchase_units[0].amount.value
    }).then(() => {
        localStorage.removeItem('myBundle');
        window.location.href = "thank-you.html";
    });
}

function goBackToCatalog() { window.location.href = 'index.html'; }

// Run render immediately
render();
</script>
</body>
