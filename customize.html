<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize Your Bundle</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Bebas+Neue&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@1,700&family=Graduate&family=Cinzel:wght@700&family=Fredoka+One&family=Space+Mono&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=AYCrwEjBMTIJctW65WTbEqCfEGx4IYVyLFU09iInrV8m4nLFonxGlAb6bD707bL-qaDSPUNfqJJzgoYS&currency=USD"></script>
    
    <script type="text/javascript">
      (function(){ emailjs.init("1LZbCPvH49G_r0ypB"); })();
    </script>

    <style>
        body {font-family: 'Segoe UI', Tahoma, sans-serif; background:#CAE4DB; padding:0; margin:0; color: #1f2937; padding-bottom: 120px;}
        .wrapper {max-width: 950px; margin: auto; padding: 20px;}
        
        .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        
        #bulk-actions {
            background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; 
            border: 2px dashed #2F6B64; display: none; align-items: center; justify-content: space-between;
        }

        /* Responsive Grid */
        .item-row {
            background: #9cbdb1; border-radius: 12px; padding: 25px; margin-bottom: 20px; 
            display: grid; grid-template-columns: 300px 1fr; gap: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative;
        }

        .preview-section { display: flex; flex-direction: column; gap: 12px; }

        .product-preview {
            width: 300px; height: 280px; background: #f9f9f9; border-radius: 8px; 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border: 1px solid #eee; overflow: hidden; padding: 10px;
        }
        
        .base-img { position: absolute; width: 90%; height: 90%; object-fit: contain; opacity: 0.25; z-index: 0; }
        .user-img-overlay { max-width: 55%; max-height: 55%; object-fit: contain; z-index: 2; margin-bottom: 10px; }
        .preview-text { width: 90%; text-align: center; font-weight: bold; font-size: 1.5rem; z-index: 2; word-wrap: break-word; line-height: 1.1; }
        
        /* DESIGN CONTROLS */
        .design-controls { display: flex; gap: 8px; width: 100%; }
        .btn-upload {
            flex: 2; background: #2F6B64; color: white; padding: 10px; border-radius: 6px; 
            font-size: 0.75rem; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-upload.success { background: #059669; }
        .btn-clear {
            flex: 1; background: #FEE84A; color: #000; border: none; padding: 8px; 
            border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-weight: bold;
        }
        .hidden-file-input { display: none; }

        /* SWATCHES */
        .swatch-container { display: flex; gap: 6px; margin-bottom: 15px; flex-wrap: wrap; }
        .swatch {
            width: 28px; height: 28px; border-radius: 4px; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .swatch.active { outline: 2px solid #000; outline-offset: 2px; }

        .details h3 {margin: 0 0 5px 0; color: #2F6B64;}
        label {display: block; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #000; letter-spacing: 0.5px;}
        
        input[type="text"], textarea, select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; 
            margin-bottom: 15px; font-family: inherit; box-sizing: border-box; background: white;
        }

        /* STYLED FONT DROPDOWN */
        select option { font-size: 1.1rem; padding: 5px; }
        
        /* STICKY FOOTER AREA */
        .sticky-footer-container {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
        }

        .summary-bar {
            background: #2F6B64; color: white; padding: 15px 30px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
        }

        .studio-notification {
            background: #fbbf24; color: #000; text-align: center; 
            padding: 10px; font-weight: bold; font-size: 0.85rem;
            display: flex; flex-direction: column; align-items: center;
        }

        .bouncing-arrow {
            font-size: 1.2rem; line-height: 1;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        /* SLIM PAYPAL */
        #paypal-button-container { width: 200px; }

        .remove-btn {background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;}

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #fbbf24; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .item-row { grid-template-columns: 1fr; justify-items: center; }
            .preview-section, .product-preview { width: 100%; max-width: 320px; }
            .summary-bar { padding: 10px 15px; }
            #paypal-button-container { width: 150px; }
        }
        .btn-clear, .remove-btn, .add-btn {
            position: relative;
            z-index: 10;
            pointer-events: auto !important;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p>Processing Designs...</p>
</div>

<div class="wrapper">
    <div class="header">
        <button onclick="goBackToCatalog()" style="cursor:pointer; padding: 8px 15px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-weight: bold;">← Back to Catalog</button>
        <h2 style="margin:0">Customize Your Bundle</h2>
    </div>
    <div id="bulk-actions">
        <div><strong>Bulk Design:</strong> Sync first item to all?</div>
        <button onclick="applyFirstToAll()" style="background: #2F6B64; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Apply to All</button>
    </div>

    <div id="items-container"></div>
</div>

<div class="sticky-footer-container">
    <div class="summary-bar">
        <div><span style="opacity:0.8; font-size: 0.8rem;">Total:</span><div style="font-size: 1.4rem; font-weight: bold;">$<span id="total-price">0</span></div></div>
        <div id="paypal-button-container"></div>
    </div>
    <div class="studio-notification">
        For more flexible customized designs visit the D.I.M. Design Studio
        <div class="bouncing-arrow">🔻🔻🔻🔻🔻⬇️🔻🔻🔻🔻🔻</div>
    </div>
</div>

<script>

// 1. GLOBAL CLICK LISTENER (Bypasses Google Sites Sandbox issues)
document.addEventListener('click', function (e) {
    // Check if we clicked a Remove button
    if (e.target && e.target.classList.contains('remove-btn')) {
        const key = e.target.getAttribute('data-key');
        removeItem(key);
    }
    // Check if we clicked a Clear button
    if (e.target && e.target.classList.contains('btn-clear')) {
        const key = e.target.getAttribute('data-key');
        clearDesign(key);
    }
});

let bundle = JSON.parse(localStorage.getItem('myBundle')) || {};

const availableColors = [
    { name: 'Black', hex: '#000000' }, { name: 'White', hex: '#FFFFFF' }, { name: 'Red', hex: '#BE123C' },
    { name: 'Navy', hex: '#1E3A8A' }, { name: 'Forest', hex: '#14532D' }, { name: 'Royal Blue', hex: '#2563EB' },
    { name: 'Rose Gold', hex: '#E2918F' }, { name: 'Gold', hex: '#D4AF37' }, { name: 'Silver', hex: '#C0C0C0' },
    { name: 'Hot Pink', hex: '#DB2777' }, { name: 'Lavender', hex: '#A78BFA' }, { name: 'Orange', hex: '#EA580C' }
];

const fontOptions = [
    { name: 'Standard', family: "'Segoe UI', sans-serif" },
    { name: 'Cursive', family: "'Pacifico', cursive" },
    { name: 'Bold', family: "'Bebas Neue', sans-serif" },
    { name: 'Modern', family: "'Montserrat', sans-serif" },
    { name: 'Elegant', family: "'Playfair Display', serif" },
    { name: 'Varsity', family: "'Graduate', serif" },
    { name: 'Luxury', family: "'Cinzel', serif" },
    { name: 'Playful', family: "'Fredoka One', cursive" },
    { name: 'Retro', family: "'Space Mono', monospace" },
    { name: 'Sketch', family: "'Shadows Into Light', cursive" }
];

function render() {
    const container = document.getElementById('items-container');
    const totalPriceEl = document.getElementById('total-price');
    const keys = Object.keys(bundle);
    let total = 0;

    container.innerHTML = '';
    
    if (keys.length === 0) {
        container.innerHTML = "<div style='text-align:center; padding:50px; background:white; border-radius:12px;'><h3>Your bundle is empty</h3><a href='index.html' style='color:#2F6B64'>Return to Shop</a></div>";
        totalPriceEl.textContent = "0";
        return;
    }

    keys.forEach(key => {
        const item = bundle[key];
        total += item.price * item.quantity;
        
        const row = document.createElement('div');
        row.className = 'item-row';
        
        // NOTE: We use classNames and data-keys instead of inline onclicks
        row.innerHTML = `
            <div class="preview-section">
                <div class="product-preview">
                    <img src="${item.img}" class="base-img">
                    <img class="user-img-overlay" src="${item.cloudinaryUrl || ''}" style="display: ${item.cloudinaryUrl ? 'block' : 'none'}">
                    <div class="preview-text" style="color: ${item.textColor || '#000000'}; font-family: ${item.fontFamily}">
                        ${item.customText || ''}
                    </div>
                </div>
                <div class="design-controls">
                    <label class="btn-upload ${item.cloudinaryUrl ? 'success' : ''}">
                        ${item.cloudinaryUrl ? '✓' : 'Upload'}
                        <input type="file" class="hidden-file-input" onchange="handleImageUpload('${key}', this)">
                    </label>
                    <button type="button" class="btn-clear" data-key="${key}">Clear</button>
                </div>
            </div>

            <div class="details">
                <div style="display:flex; justify-content:space-between; align-items: flex-start;">
                    <h3 style="margin:0;">${key}</h3>
                    <button type="button" class="remove-btn" data-key="${key}">✕</button>
                </div>
                </div>
        `;
        container.appendChild(row);
    });

    totalPriceEl.textContent = total;
    if (total > 0) initPayPal(total);
}

function removeItem(key) {
    delete bundle[key];
    saveAndRefresh();
}

function clearDesign(key) {
    bundle[key].cloudinaryUrl = '';
    bundle[key].customText = '';
    saveAndRefresh();
}

function saveAndRefresh() {
    try {
        localStorage.setItem('myBundle', JSON.stringify(bundle));
    } catch (e) { console.error("Storage blocked"); }
    
    // If empty, go back to shop
    if (Object.keys(bundle).length === 0) {
        window.location.assign('index.html');
    } else {
        render();
    }
}
window.handleImageUpload = async (key, input) => {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('loading-overlay').style.display = 'flex';
    
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', 'Custom_Bundle_Preset');
    
    try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/dpsmcu07f/image/upload`, { method: 'POST', body: formData });
        const data = await response.json();
        if (data.secure_url) {
            bundle[key].cloudinaryUrl = data.secure_url;
            localStorage.setItem('myBundle', JSON.stringify(bundle));
            saveAndRefresh();
            render();
        }
    } catch (e) { alert("Upload failed."); }
    document.getElementById('loading-overlay').style.display = 'none';
};


window.updateProp = (key, prop, value) => {
    bundle[key][prop] = value;
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    
    // Immediate preview updates
    if (prop === 'customText') {
        document.getElementById(`text-layer-${key}`).textContent = value;
    } else if (prop === 'textColor') {
        document.getElementById(`text-layer-${key}`).style.color = value;
        render(); // Refresh for active swatch state
    } else if (prop === 'fontFamily') {
        document.getElementById(`text-layer-${key}`).style.fontFamily = value;
    } else {
        render();
    }
};


function applyFirstToAll() {
    const keys = Object.keys(bundle);
    const s = bundle[keys[0]];
    keys.forEach(k => {
        bundle[k].customText = s.customText;
        bundle[k].textColor = s.textColor;
        bundle[k].fontFamily = s.fontFamily;
    });
    saveAndRefresh();
}

function initPayPal(total) {
    const container = document.getElementById('paypal-button-container');
    container.innerHTML = ''; 
    paypal.Buttons({
        style: {
            layout: 'horizontal',
            color: 'gold',
            shape: 'rect',
            label: 'paypal',
            tagline: false,
            height: 35
        },
        createOrder: (d, a) => a.order.create({ purchase_units: [{ amount: { value: total.toString() } }] }),
        onApprove: (d, a) => a.order.capture().then(det => sendOrderEmail(det))
    }).render('#paypal-button-container');
}

function sendOrderEmail(details) {
    let orderSummary = Object.entries(bundle).map(([name, item]) => {
        return `ITEM: ${name} | QTY: ${item.quantity}\nTEXT: ${item.customText}\nCOLOR: ${item.textColor}\nFONT: ${item.fontFamily}\nLINK: ${item.cloudinaryUrl || 'None'}\n---`;
    }).join('\n');

    emailjs.send('service_ezq1fuc', 'template_r4hpykx', {
        order_id: details.id,
        customer_name: details.payer.name.given_name,
        message: orderSummary,
        total_paid: details.purchase_units[0].amount.value
    }).then(() => {
        localStorage.clear();
        window.location.href = "thank-you.html";
    });
}
function goBackToCatalog() {
    localStorage.setItem('myBundle', JSON.stringify(bundle));
    window.location.href = 'index.html';
}
render();
</script>
</body>
</html>
