// --- 3. THE RENDER ENGINE ---
function render() {
    const container = document.getElementById('items-container');
    if (!container) return;
    container.innerHTML = '';
    
    let subtotal = 0;
    let itemCount = 0;

    const entries = Object.entries(bundle);
    if (entries.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px;"><h2>Your bundle is empty</h2><a href="index.html" style="color:#2F6B64;">Return to Catalog</a></div>';
        return;
    }

    entries.forEach(([key, item]) => {
        const p = productList.find(prod => prod.id === item.productId);
        if(!p) return;

        // Logic for Variation/Style selection
        const selectedVar = p.variations ? p.variations.find(v => v.label === item.variety) : null;
        const selectedStyle = p.styles ? p.styles.find(s => s.label === item.style) : null;
        
        let extra = 0;
        if (selectedVar) extra += selectedVar.extra;
        if (selectedStyle) extra += selectedStyle.extra;
        const itemPrice = p.basePrice + extra;
        const itemSubtotal = itemPrice * item.quantity;

window.updateProp = (key, prop, val) => {
    if (prop === 'fontSize') val = parseInt(val);

    bundle[key][prop] = val;
    localStorage.setItem('myBundle', JSON.stringify(bundle));

    const card = document.querySelector(`[data-key="${key}"]`);

    if (prop === 'customText' && card) {
        card.querySelector('.preview-text').textContent = val;
    } else if (prop === 'fontSize' && card) {
        card.querySelector('.preview-text').style.fontSize = val + "px";
    } else {
        render();
    }
};

window.handleImageUpload = (key, input) => {
    const file = input.files[0];
    if (!file) return;

    // ADD THIS: Check if file is larger than 2MB
    if (file.size > 2 * 1024 * 1024) {
        alert("Image is too large! Please upload a file smaller than 2MB.");
        return;
    }

    const reader = new FileReader();
    // ... rest of your code ...
    reader.onload = (e) => {
        bundle[key].localImage = e.target.result; 
        localStorage.setItem('myBundle', JSON.stringify(bundle));
        render();
    };
    reader.readAsDataURL(file);
};

async function processCloudinaryUploads() {
    const overlay = document.getElementById('loading-overlay');
    if (overlay) overlay.style.display = 'flex';

    for (let key in bundle) {
        // Upload only if there is a local image and it hasn't been uploaded yet
        if (bundle[key].localImage && !bundle[key].cloudinaryUrl) {
            const formData = new FormData();
            formData.append('file', bundle[key].localImage);
            formData.append('upload_preset', 'Custom_Bundle_Preset'); 
            
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dpsmcu07f/image/upload`, { 
                    method: 'POST', 
                    body: formData 
                });
                const data = await res.json();
                bundle[key].cloudinaryUrl = data.secure_url;
            } catch (e) { 
                console.error("Cloudinary Error for " + key + ":", e); 
            }
        }
    }
    localStorage.setItem('myBundle', JSON.stringify(bundle));
}

function initPayPal(total) {
    const container = document.getElementById('paypal-button-container');
    if (!container) return;
    container.innerHTML = '';
    
    paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal', tagline: false },
        createOrder: (data, actions) => actions.order.create({ 
            purchase_units: [{ amount: { value: total } }] 
        }),
        onApprove: async (data, actions) => {
            const details = await actions.order.capture();
            await sendOrderEmail(details);
        }
    }).render('#paypal-button-container');
}

async function sendOrderEmail(details) {
    await processCloudinaryUploads();
    
    // Create a clear summary for your inbox
    let summary = Object.entries(bundle).map(([k, v]) => {
        return `ITEM: ${v.productId} | QTY: ${v.quantity}
STYLE: ${v.variety || 'N/A'} / ${v.style || 'N/A'}
TEXT: ${v.customText || 'None'}
IMAGE: ${v.cloudinaryUrl || 'No Image'}
NOTES: ${v.notes || 'None'}
--------------------------`;
    }).join('\n');
    
    const templateParams = {
        order_id: details.id,
        customer_name: details.payer.name.given_name,
        customer_email: details.payer.email_address,
        message: summary,
        total_paid: details.purchase_units[0].amount.value
    };

    try {
        await emailjs.send('service_ezq1fuc', 'template_r4hpykx', templateParams);
        localStorage.removeItem('myBundle');
        window.location.href = "thank-you.html";
   } catch (error) {
    console.error("EmailJS Failed:", error);
    
    // 1. Hide the spinning loader but keep the overlay visible
    const overlay = document.getElementById('loading-overlay');
    
    // 2. Inject a clear, red error message so they can see it in Google Sites
    overlay.innerHTML = `
        <div style="background: white; padding: 30px; border-radius: 12px; max-width: 90%; text-align: center; border: 3px solid #BE123C;">
            <h2 style="color: #BE123C; margin-top: 0;">Payment Successful!</h2>

            <p style="background: #fef2f2; padding: 10px; border: 1px solid #fecaca; border-radius: 6px;">
                Please email us your <strong>Order ID: ${details.id}</strong> so we can match it to your custom designs.

                Return to Shop
            </button>
        </div>
    `;
    
    // Ensure the overlay is visible to show the message
    overlay.style.display = 'flex'; 
}
    }
