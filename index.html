<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed!</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #CAE4DB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .checkmark {
            font-size: 60px;
            color: #2F6B64;
            margin-bottom: 20px;
        }
        h1 { color: #1f2937; margin-bottom: 10px; }
        p { color: #4b5563; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #2F6B64;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="checkmark">✔</div>
    <h1>Order Received!</h1>
    <p>Thank you for your purchase. We have received your custom designs and will begin working on your bundle shortly.</p>
    <p style="font-size: 0.9rem; color: #9ca3af;">A confirmation email has been sent to your PayPal email address.</p>
    <a href="#" onclick="goHome()" class="btn">Return to Shop</a>

<script>
    function goHome() {
        // Clear the data so they can start a fresh bundle
        localStorage.removeItem('myBundle'); 
        // Redirect back to the catalog
        window.location.href = 'index.html'; 
    }
</script>
</div>

</body>
</html>
